function fmtDuration(sec){sec=Math.max(0,Math.floor(sec));const h=String(Math.floor(sec/3600)).padStart(2,'0');const m=String(Math.floor((sec%3600)/60)).padStart(2,'0');const s=String(sec%60).padStart(2,'0');return `${h}:${m}:${s}`;}
function fmtCountdown(ms){if(ms<=0)return 'Disponível agora';const total=Math.floor(ms/1000),h=Math.floor(total/3600),m=Math.floor((total%3600)/60),s=total%60;return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;}
function fmtDate(ts){return new Date(ts).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});}

function currentBanner(){

}

    ${related?`<div class="action-available"><div class="eyebrow">Ação disponível neste equipamento</div><div class="row"><div><strong>${related.title}</strong><p>${related.component}<br>${related.group==='unscheduled'?'Início imediato':'Programada'}</p></div><button data-action="open-related">Abrir agora</button></div></div>`:''}

    <div class="machine-state ${stopped?'stopped':''}"><div class="state-copy"><strong>${stopped?'Equipamento parado':'Equipamento em operação'}</strong><span>${stopped?'Parada iniciada pelo operador. A contagem continua mesmo ao sair desta tela.':'Nenhuma parada ativa registrada pelo operador.'}</span></div><span class="state-pill">${stopped?'PARADO':'OPERANDO'}</span></div>
    ${stopped?`<div class="stop-clock"><div class="stop-top"><div><div class="eyebrow">Tempo de parada</div><strong>Contagem em andamento</strong></div><div class="clock" id="stopTimer">${stopElapsed()}</div></div><p>Ao finalizar, o equipamento volta ao estado operacional e o tempo de ociosidade fica registrado no histórico.</p><button data-action="finish-stop">Finalizar parada — máquina voltou a operar</button></div>`:''}

    <div class="section-head"><div><h2>Parâmetros cadastrados</h2><p class="small">Registre leituras operacionais definidas para este equipamento.</p></div><span class="section-count">${asset.parameters.length}</span></div>
    <div class="measurement-list">${asset.parameters.map(m=>`<div class="measurement-card"><div><strong>${m.name}: ${m.value} ${m.unit}</strong><span>Faixa aceitável: ${m.min} a ${m.max} ${m.unit}<br>Última medição: ${m.date}</span></div><button class="measure-now" data-measure="${m.id}">Medir agora</button></div>`).join('')}</div>

    <div class="section-head"><div><h2>Histórico do equipamento</h2><p class="small">Manutenções, componentes substituídos, lubrificações, paradas e atividades programadas.</p></div></div>
    <div class="timeline">
      ${asset.occurrences.map(o=>`<div class="timeline-item"><div class="timeline-top"><strong>${o.symptom}</strong><span class="status-pill warn">${o.status}</span></div><span>${o.description}</span><span>${o.date} · ${o.shift}</span></div>`).join('')}
      ${asset.history.map(h=>`<div class="timeline-item"><div class="timeline-top"><strong>${h.title}</strong><span class="status-pill ${h.status==='Concluída'?'ok':'warn'}">${h.status}</span></div><span>${h.detail}</span><span>${h.date}</span></div>`).join('')}
    </div>

    <div class="qr-actions">
      <button class="occ" data-action="open-occurrence">Informar ocorrência</button>
      <button class="stop ${stopped?'resume':''}" data-action="${stopped?'finish-stop':'start-stop'}">${stopped?'Finalizar parada':'Iniciar parada agora'}</button>
    </div>
    <div class="info-note">Ocorrências apoiam a análise técnica. Paradas registram o tempo real de ociosidade do equipamento para gestão, qualidade e PCM.</div>
  </section>`;
}
function historyView(){state.screen='qr';return qrView();}
function settingsView(){return `<section class="screen"><div><div class="eyebrow">Configurações</div><h1>Preferências do operador</h1></div><div class="card block"><h3>Alertas operacionais</h3><p>Liberações programadas e ações emergenciais aparecem como cards acionáveis na tela.</p><span class="tag green">Ativados</span></div><div class="card block"><h3>Sincronização</h3><p>Checklist, medições, ocorrências e evidências são enviados automaticamente quando houver conexão.</p><span class="tag green">Online</span></div></section>`;}
function answered(i){const s=state.selectedJob.steps[i];if(s.type==='photo')return state.photos>=s.required;return state.answers[i]!==undefined&&state.answers[i]!=='';}
function elapsed(){return state.executionStart?fmtDuration((Date.now()-state.executionStart)/1000):'00:00:00';}

function setupTechnicalReadGate(){
  const main=document.getElementById('main');
  const end=document.getElementById('technicalReportEnd');
  if(!main||!end)return;
  const evaluate=()=>{
    const max=Math.max(1,main.scrollHeight-main.clientHeight);
    const pct=Math.min(100,Math.max(0,(main.scrollTop/max)*100));
    state.technicalReadPct=pct;
    const endRect=end.getBoundingClientRect();
    const mainRect=main.getBoundingClientRect();
    const reached=endRect.top<=mainRect.bottom-24;
    if(reached&&!state.technicalReadComplete){
      state.technicalReadComplete=true;
      state.technicalReadPct=100;
      render();
      setTimeout(()=>{const m=document.getElementById('main');if(m)m.scrollTop=m.scrollHeight;},0);
      return;
    }
    const label=document.querySelector('.read-progress-top span');
    const bar=document.querySelector('.read-bar b');
    if(label&&!state.technicalReadComplete)label.textContent=Math.round(pct)+'%';
    if(bar&&!state.technicalReadComplete)bar.style.width=pct+'%';
  };
  main.onscroll=evaluate;
  setTimeout(evaluate,0);
}

function render(){let html='';if(state.screen==='home')html=homeView();else if(state.screen==='detail')html=detailView();else if(state.screen==='exec')html=execView();else if(state.screen==='qr')html=qrView();else if(state.screen==='history')html=historyView();else html=settingsView();document.getElementById('main').innerHTML=html;setNav();bind();startUiTicker();}
function setNav(){document.querySelectorAll('[data-nav]').forEach(b=>b.classList.toggle('active',b.dataset.nav===state.screen||(state.screen==='detail'||state.screen==='exec')&&b.dataset.nav==='home'));}
function bind(){document.querySelectorAll('[data-action]').forEach(b=>b.onclick=()=>act(b.dataset.action));const ta=document.getElementById('technicalAccept');if(ta)ta.onchange=()=>{if(!state.technicalReadComplete){ta.checked=false;return;}state.technicalAccepted=ta.checked;render();};if(state.screen==='detail')setupTechnicalReadGate();document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>{state.tab=b.dataset.tab;render();});document.querySelectorAll('[data-job]').forEach(b=>b.onclick=()=>openJob(b.dataset.job));document.querySelectorAll('[data-measure]').forEach(b=>b.onclick=()=>openMeasure(b.dataset.measure));document.querySelectorAll('[data-answer]').forEach(b=>b.onclick=()=>{state.answers[state.step]=b.dataset.answer;state.alert='';render();});document.querySelectorAll('[data-nav]').forEach(b=>b.onclick=()=>{state.screen=b.dataset.nav;render();});const notif=document.getElementById('notifBtn');if(notif)notif.onclick=openNotifications;}
function openJob(id){state.selectedJob=jobs.find(j=>j.id===id);if(!state.selectedJob)return;state.technicalAccepted=false;state.technicalReadComplete=false;state.technicalReadPct=0;state.screen='detail';render();}
function act(a){if(a==='back'){state.screen='home';render();return;}if(a==='scan'){scanFlow();return;}if(a==='clear-qr'){state.qrAsset=null;state.screen='qr';render();return;}if(a==='open-related'){const related=jobs.find(j=>j.asset.startsWith(asset.id)&&j.status!=='CONCLUIDA');if(related)openJob(related.id);return;}if(a==='open-occurrence'){openOccurrence();return;}if(a==='start-stop'){startStop();return;}if(a==='finish-stop'){finishStop();return;}if(a==='start'){const j=state.selectedJob;if(Date.now()<j.startAt&&j.status!=='EM_EXECUCAO')return;if((!state.technicalReadComplete||!state.technicalAccepted)&&j.status!=='EM_EXECUCAO'){toast('Leia até o final e confirme o relatório técnico');return;}j.status='EM_EXECUCAO';state.screen='exec';state.step=0;state.answers={};state.photos=0;state.alert='';state.executionStart=state.executionStart||Date.now();state.executionDelayed=false;state.delayNotified=false;render();return;}if(a==='prev'){if(state.step>0){state.step--;state.alert='';render();}else{state.screen='detail';render();}return;}if(a==='next'){if(validate()){state.step++;state.alert='';render();}return;}if(a==='finish'){if(validate())finishFlow();return;}if(a==='photo'){const s=state.selectedJob.steps[state.step];state.photos=Math.min(state.photos+1,s.required);toast(`Foto ${state.photos} registrada`);render();return;}}
function persistNumber(){const s=state.selectedJob.steps[state.step];if(s.type==='number')state.answers[state.step]=document.getElementById('numInput')?.value??s.value;}
function validate(){const s=state.selectedJob.steps[state.step];state.alert='';if(s.type==='number'){persistNumber();const v=parseFloat(state.answers[state.step]);if(Number.isNaN(v)){state.alert='Informe um valor válido.';render();return false;}if(v<s.min||v>s.max){state.alert=`Valor fora da faixa aceitável de ${s.min} a ${s.max} ${s.unit}.`;render();return false;}return true;}if(s.type==='photo'){if(state.photos<s.required){state.alert=`Registre ${s.required} foto(s) antes de finalizar.`;render();return false;}return true;}if(!answered(state.step)){state.alert='Responda este item antes de continuar.';render();return false;}return true;}
function startUiTicker(){clearInterval(state.timerId);state.timerId=setInterval(()=>{const t=document.getElementById('timer');if(t&&state.executionStart)t.textContent=elapsed();const st=document.getElementById('stopTimer');if(st&&asset.stop.active)st.textContent=stopElapsed();document.querySelectorAll('[data-countdown]').forEach(el=>{const j=jobs.find(x=>x.id===el.dataset.countdown);if(j)el.textContent=fmtCountdown(j.startAt-Date.now());});const startBtn=document.querySelector('[data-action="start"]');if(startBtn&&state.selectedJob&&Date.now()>=state.selectedJob.startAt&&state.selectedJob.status!=='EM_EXECUCAO'){startBtn.disabled=false;startBtn.textContent='Iniciar execução';}jobs.filter(j=>j.group==='scheduled').forEach(j=>{if(Date.now()>=j.startAt&&!j.releasedNotified){j.releasedNotified=true;state.notifications.unshift({title:'Operação programada liberada agora',subtitle:j.title,jobId:j.id,date:'Agora'});showOperationalNotification(j,'OPERAÇÃO PROGRAMADA LIBERADA');if(state.screen==='home')render();}});if(state.screen==='exec'&&state.executionStart&&state.selectedJob){const sec=(Date.now()-state.executionStart)/1000;if(sec>=state.selectedJob.testDelayAt&&!state.delayNotified){state.delayNotified=true;state.executionDelayed=true;state.notifications.unshift({title:'Tempo previsto excedido',subtitle:state.selectedJob.title,jobId:state.selectedJob.id,date:'Agora'});render();}}},1000);}
function showOperationalNotification(job,kicker){const pop=document.getElementById('notificationPop');pop.innerHTML=`<button id="openNotification"><div><div class="np-kicker">${kicker}</div><strong>${job.title}</strong><span>${job.asset}</span></div><b>Abrir agora →</b></button>`;pop.classList.add('show');document.getElementById('openNotification').onclick=()=>{pop.classList.remove('show');openJob(job.id);};clearTimeout(state.notificationTimer);state.notificationTimer=setTimeout(()=>pop.classList.remove('show'),9000);}
function finishFlow(){const j=state.selectedJob,overlay=document.getElementById('overlay');overlay.className='sync-overlay show';overlay.innerHTML=`<div class="center"><div class="spinner"></div><h2>Sincronizando dados</h2><p>Enviando checklist, parâmetros, evidências e tempo total.</p></div>`;setTimeout(()=>{j.status='CONCLUIDA';const total=elapsed();const sec=Math.floor((Date.now()-state.executionStart)/1000);const delta=sec-j.testDelayAt;const performance=delta<=0?'Dentro do tempo previsto':`${fmtDuration(delta)} acima do limite de teste`;overlay.innerHTML=`<div class="center"><div class="check">${icons.check}</div><h2>Execução concluída</h2><p>Dados sincronizados com sucesso.</p><div class="result-grid"><div class="result"><span>Tempo de execução</span><strong>${total}</strong></div><div class="result"><span>Comparação</span><strong>${performance}</strong></div><div class="result"><span>Checklist</span><strong>${j.steps.length}/${j.steps.length}</strong></div><div class="result"><span>Evidências</span><strong>${state.photos} foto(s)</strong></div></div></div>`;},900);setTimeout(()=>{overlay.className='sync-overlay';overlay.innerHTML='';state.screen='home';state.tab='done';state.selectedJob=null;state.step=0;state.answers={};state.photos=0;state.executionStart=null;state.executionDelayed=false;state.delayNotified=false;render();},2900);}
function scanFlow(){const overlay=document.getElementById('overlay');overlay.className='sync-overlay show';overlay.innerHTML=`<div class="center"><div class="scanbox"><div class="scanframe"></div></div><h2>Lendo QR Code</h2><p>Consultando ficha técnica, parâmetros e histórico.</p></div>`;setTimeout(()=>{overlay.innerHTML=`<div class="center"><div class="check">${icons.check}</div><h2>${asset.id} identificado</h2><p>Histórico técnico carregado.</p></div>`;},850);setTimeout(()=>{overlay.className='sync-overlay';overlay.innerHTML='';state.qrAsset=asset.id;state.screen='qr';render();},1600);}

function restoreStop(){
  try{
    const raw=localStorage.getItem('fab_control_stop_'+asset.id);
    if(!raw)return;
    const data=JSON.parse(raw);
    if(data&&data.active&&data.startedAt){asset.stop.active=true;asset.stop.startedAt=data.startedAt;}
  }catch(e){}
}
function persistStop(){
  try{localStorage.setItem('fab_control_stop_'+asset.id,JSON.stringify(asset.stop));}catch(e){}
}
function stopElapsed(){
  if(!asset.stop.active||!asset.stop.startedAt)return '00:00:00';
  return fmtDuration((Date.now()-asset.stop.startedAt)/1000);
}
function startStop(){
  if(asset.stop.active)return;
  asset.stop.active=true;
  asset.stop.startedAt=Date.now();
  persistStop();
  asset.occurrences.unshift({id:'STOP-'+Date.now(),symptom:'Parada não programada iniciada',severity:'Alta',description:'Equipamento marcado como parado pelo operador. Contagem de ociosidade iniciada.',date:new Date().toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}),shift:'Turno A',status:'Parada em andamento'});
  state.notifications.unshift({title:'Equipamento parado',subtitle:`${asset.id} — contagem iniciada`,jobId:null,date:'Agora'});
  render();
  toast('Parada iniciada');
}
function finishStop(){
  if(!asset.stop.active)return;
  const duration=Math.max(0,Math.floor((Date.now()-asset.stop.startedAt)/1000));
  asset.stop.active=false;
  asset.stop.lastDuration=duration;
  asset.stop.startedAt=null;
  try{localStorage.removeItem('fab_control_stop_'+asset.id);}catch(e){}
  const running=asset.occurrences.find(o=>o.status==='Parada em andamento');
  if(running){running.status='Finalizada';running.description=`Equipamento voltou a operar. Tempo total de parada: ${fmtDuration(duration)}.`;}
  asset.history.unshift({title:'Parada não programada finalizada',detail:`Tempo de ociosidade registrado: ${fmtDuration(duration)}. Equipamento voltou a operar.`,date:new Date().toLocaleDateString('pt-BR'),status:'Concluída'});
  state.notifications.unshift({title:'Parada finalizada',subtitle:`${asset.id} — ${fmtDuration(duration)} de ociosidade`,jobId:null,date:'Agora'});
  render();
  toast('Parada finalizada');
}

function openMeasure(id){const m=asset.parameters.find(x=>x.id===id);if(!m)return;state.measureTarget=m;const modal=document.getElementById('modal');modal.className='modal show';modal.innerHTML=`<div class="center measure-modal"><div style="display:flex;justify-content:space-between;gap:10px;align-items:center"><div><div class="eyebrow">Parâmetro cadastrado</div><h2>${m.name}</h2></div><button class="tag gray" id="cancelMeasure">Fechar</button></div><p>Último valor: ${m.value} ${m.unit} em ${m.date}.</p><div class="measure"><input id="measureInput" type="number" step="0.1" inputmode="decimal" value="${m.value}"><div class="unit">${m.unit}</div></div><div class="range" style="margin-top:10px"><span>Faixa aceitável</span><strong>${m.min} a ${m.max} ${m.unit}</strong></div><div id="measureStatus"></div><button class="primary" id="saveMeasure" style="width:100%;margin-top:14px">Registrar medição</button></div>`;document.getElementById('cancelMeasure').onclick=closeMeasure;document.getElementById('saveMeasure').onclick=saveMeasure;}
function closeMeasure(){const modal=document.getElementById('modal');modal.className='modal';modal.innerHTML='';state.measureTarget=null;}
function saveMeasure(){const m=state.measureTarget,input=document.getElementById('measureInput'),status=document.getElementById('measureStatus');if(!m||!input||!status)return;const value=parseFloat(input.value);if(Number.isNaN(value)){status.className='measure-status bad';status.textContent='Informe um valor numérico válido.';return;}m.value=value;m.date=new Date().toLocaleDateString('pt-BR');const outside=value<m.min||value>m.max;if(outside){asset.occurrences.unshift({id:'OCR-'+Date.now(),symptom:`${m.name} fora da faixa`,severity:'Alta',description:`Leitura registrada: ${value} ${m.unit}. Faixa configurada: ${m.min} a ${m.max} ${m.unit}.`,date:new Date().toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}),shift:'Turno A',status:'Inspeção solicitada'});state.notifications.unshift({title:'Inspeção solicitada por parâmetro fora da faixa',subtitle:`${m.name}: ${value} ${m.unit}`,jobId:null,date:'Agora'});status.className='measure-status bad';status.textContent='Valor fora da faixa. Solicitação de inspeção enviada para análise técnica.';}else{status.className='measure-status ok';status.textContent='Medição registrada dentro da faixa.';}setTimeout(()=>{closeMeasure();render();toast(outside?'Inspeção solicitada':'Medição registrada');},1200);}
function openOccurrence(){state.occurrencePhoto=false;const modal=document.getElementById('modal');modal.className='modal show';modal.innerHTML=`<div class="center" style="text-align:left;max-height:88%;overflow:auto"><div style="display:flex;justify-content:space-between;gap:10px;align-items:center"><div><div class="eyebrow">${asset.id} — ${asset.name}</div><h2>Solicitar inspeção</h2></div><span class="tag orange">Registro do operador</span></div><div class="form-grid"><div class="field"><label for="occSymptom">O que foi observado?</label><select id="occSymptom"><option>Vibração muito alta</option><option>Ruído anormal</option><option>Aquecimento excessivo</option><option>Vazamento</option><option>Desalinhamento</option><option>Falha intermitente</option><option>Outro</option></select></div><div class="field"><label for="occSeverity">Percepção de risco</label><select id="occSeverity"><option>Baixa</option><option selected>Média</option><option>Alta</option><option>Crítica — parar e avaliar</option></select></div><div class="field"><label for="occDescription">Descrição do que aconteceu</label><textarea id="occDescription" placeholder="Ex.: A máquina apresentou vibração e ruído no lado do acionamento durante o ciclo."></textarea></div><button class="secondary" id="occPhoto" style="width:100%;min-height:46px">Adicionar foto opcional</button><div class="form-note">O envio cria uma solicitação de inspeção. Administração e gestão analisam o registro e definem a próxima ação técnica. Não é criada manutenção automaticamente.</div></div><div class="modal-actions"><button class="secondary" id="cancelOccurrence">Cancelar</button><button class="primary" id="saveOccurrence">Enviar para inspeção</button></div></div>`;document.getElementById('cancelOccurrence').onclick=closeOccurrence;document.getElementById('occPhoto').onclick=()=>{state.occurrencePhoto=!state.occurrencePhoto;document.getElementById('occPhoto').textContent=state.occurrencePhoto?'Foto adicionada ✓':'Adicionar foto opcional';};document.getElementById('saveOccurrence').onclick=saveOccurrence;}
function closeOccurrence(){const modal=document.getElementById('modal');modal.className='modal';modal.innerHTML='';state.occurrencePhoto=false;}
function saveOccurrence(){const symptom=document.getElementById('occSymptom')?.value||'',severity=document.getElementById('occSeverity')?.value||'',description=(document.getElementById('occDescription')?.value||'').trim();if(!description){toast('Descreva a condição observada');return;}asset.occurrences.unshift({id:'OCR-'+Date.now(),symptom,severity,description,date:new Date().toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}),shift:'Turno A',status:'Aguardando inspeção'});state.notifications.unshift({title:'Solicitação de inspeção registrada',subtitle:`${asset.id}: ${symptom}`,jobId:null,date:'Agora'});closeOccurrence();render();toast('Solicitação enviada para inspeção');}
function openNotifications(){const m=document.getElementById('modal');m.className='modal show';m.innerHTML=`<div class="center" style="text-align:left"><div style="display:flex;justify-content:space-between;gap:10px;align-items:center"><h2>Histórico de alertas</h2><button class="tag gray" id="closeModal">Fechar</button></div><div class="timeline" style="margin-top:14px">${state.notifications.map(n=>`<button class="timeline-item" ${n.jobId?`data-alert-job="${n.jobId}"`:''}><div class="timeline-top"><strong>${n.title}</strong><span class="status-pill">${n.date}</span></div><span>${n.subtitle}</span></button>`).join('')}</div></div>`;document.getElementById('closeModal').onclick=()=>{m.className='modal';m.innerHTML='';};document.querySelectorAll('[data-alert-job]').forEach(b=>b.onclick=()=>{m.className='modal';m.innerHTML='';openJob(b.dataset.alertJob);});}
restoreStop();
render();
setTimeout(()=>{const urgent=jobs[0];if(state.screen==='home')showOperationalNotification(urgent,'AÇÃO EMERGENCIAL DISPONÍVEL');},650);
</script>
</body>
</html>
